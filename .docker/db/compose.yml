networks:
  db:
    driver: bridge
    name: portfolio_db

volumes:
  sqlite_data:
    driver: local
    name: portfolio_sqlite_data

services:
  sqlite:
    image: ghcr.io/tursodatabase/libsql-server:v0.24.31
    platform: linux/amd64
    networks:
      - db
    ports:
      - target: 8080
        published: 8081
        protocol: tcp
    environment:
      SQLD_NODE: primary
    volumes:
      - type: volume
        source: sqlite_data
        target: /var/lib/sqld
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  setup-db:
    image: oven/bun:1.1.43
    networks:
      - db
    environment:
      DATABASE_URL: http://sqlite:8080
      MIGRATION_DIR: /migration
      SQL_DIR: /sql
    volumes:
      - type: bind
        source: ./migration
        target: /migration
        read_only: true
      - type: bind
        source: ./sql
        target: /sql
        read_only: true
      - type: bind
        source: ./scripts/setup-via-http.mjs
        target: /setup-via-http.mjs
        read_only: true
    depends_on:
      - sqlite
    entrypoint: ["bun", "/setup-via-http.mjs"]
    restart: "no"
