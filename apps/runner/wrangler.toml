name = "portfolio-runner"
compatibility_date = "2025-11-17"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"

# Secrets (wrangler secret put RUNNER_TOKEN):
#   RUNNER_TOKEN

[vars]
NODE_ENV = "production"

[[kv_namespaces]]
binding = "RUNS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[queues.producers]]
binding = "POD_QUEUE"
queue = "portfolio-runner-pods"

[[queues.consumers]]
queue = "portfolio-runner-pods"
max_batch_size = 10
max_retries = 3
