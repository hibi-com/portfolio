# CIで利用するツール類用のcomposeファイル
# renovateの対象に含めるために他のcomposeファイルと分離

services:
  gitleaks:
    image: zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["dir", "--config", ".gitleaks.toml", "-v", "--redact", "."]
