version: 2.1

orbs:
  node: circleci/node@7.1.0
  browser-tools: circleci/browser-tools@1.5.0

executors:
  default:
    docker:
      - image: cimg/node:22.12
    resource_class: large
    working_directory: ~/project

  large:
    docker:
      - image: cimg/node:22.12-browsers
    resource_class: large
    working_directory: ~/project

  # docker compose（compose.yaml / compose.ci.yaml）を使うジョブ用
  machine-large:
    machine:
      image: ubuntu-2204:2024.11.1
    resource_class: large
    working_directory: ~/project

commands:
  install-bun:
    description: Install Bun runtime (version from package.json packageManager)
    steps:
      - run:
          name: Install Bun
          command: |
            BUN_VERSION="$(node -p "require('./package.json').packageManager.replace(/^bun@/,'')")"
            echo "Installing Bun ${BUN_VERSION} (pinned to packageManager)"
            curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
            echo 'export BUN_INSTALL="$HOME/.bun"' >> $BASH_ENV
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            bun --version


  load-env-config:
    description: Load and decode environment configuration from CircleCI variables
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - run:
          name: Decode environment configuration for << parameters.environment >>
          command: |
            ENV_VAR_NAME="ENV_CONFIG_<< parameters.environment >>"
            ENV_VAR_NAME="${ENV_VAR_NAME^^}"

            echo "Loading environment configuration: ${ENV_VAR_NAME}"

            case "<< parameters.environment >>" in
              rc)
                ENV_CONFIG="${ENV_CONFIG_RC}"
                ;;
              stg)
                ENV_CONFIG="${ENV_CONFIG_STG}"
                ;;
              prd)
                ENV_CONFIG="${ENV_CONFIG_PRD}"
                ;;
            esac

            if [ -z "${ENV_CONFIG}" ]; then
              echo "Error: ${ENV_VAR_NAME} is not set"
              exit 1
            fi

            mkdir -p infra
            echo "${ENV_CONFIG}" | base64 -d > infra/env.yaml

            echo "✓ Environment configuration loaded successfully"

  restore-deps:
    description: Restore cached dependencies
    steps:
      - restore_cache:
          keys:
            - bun-deps-v1-{{ checksum "bun.lock" }}
            - bun-deps-v1-

  save-deps:
    description: Save dependencies to cache
    steps:
      - save_cache:
          key: bun-deps-v1-{{ checksum "bun.lock" }}
          paths:
            - node_modules
            - ~/.bun

  restore-turbo:
    description: Restore Turborepo cache
    steps:
      - restore_cache:
          keys:
            - turbo-cache-v1-{{ .Branch }}-{{ .Revision }}
            - turbo-cache-v1-{{ .Branch }}-
            - turbo-cache-v1-

  save-turbo:
    description: Save Turborepo cache
    steps:
      - save_cache:
          key: turbo-cache-v1-{{ .Branch }}-{{ .Revision }}
          paths:
            - .turbo

  login-pulumi-r2:
    description: Login to Pulumi DIY backend on Cloudflare R2
    steps:
      - run:
          name: Login Pulumi (R2 backend)
          command: |
            set -euo pipefail
            for v in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY PULUMI_BACKEND_URL PULUMI_CONFIG_PASSPHRASE; do
              if [ -z "${!v:-}" ]; then
                echo "Error: ${v} is not set (CircleCI Context 'pulumi' を確認)"
                exit 1
              fi
            done
            echo "Backend: ${PULUMI_BACKEND_URL}"
            pulumi login "${PULUMI_BACKEND_URL}"
            pulumi whoami -v || true

  prepare-infra-env:
    description: Decode ENV_CONFIG and materialize infra/.env for Pulumi
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - load-env-config:
          environment: << parameters.environment >>
      - run:
          name: Materialize infra/.env from env.yaml
          command: |
            cd infra
            bun run scripts/env-yaml-to-dotenv.mjs
            # Pulumi / dotenv 用に必須キーが空でないことだけ確認（値は出さない）
            for v in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_ZONE_ID SENTRY_AUTH_TOKEN SENTRY_ORG; do
              if ! grep -q "^${v}=.\+" .env; then
                echo "Error: ${v} is empty in infra/.env (env.yaml / ENV_CONFIG を確認)"
                exit 1
              fi
            done
            echo "✓ infra/.env ready"

jobs:
  setup:
    executor: default
    steps:
      - checkout
      - install-bun
      - restore-deps
      - run:
          name: Install dependencies
          command: |
            # prepare（workspace setup / 全ビルド）は重いので CI ではスキップし、必要な生成だけ実行
            bun install --frozen-lockfile --ignore-scripts
            bun run generate --filter='!@portfolio/infra'
            bun run build
          no_output_timeout: 20m
      - save-deps
      - restore-turbo
      - save-turbo
      - persist_to_workspace:
          root: .
          paths:
            - .
            - node_modules
            - packages/*/node_modules
            - apps/*/node_modules

  format:
    executor: default
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - run:
          name: Format check TypeScript
          command: bun run fmt:check

  lint:
    executor: default
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - run:
          name: Lint TypeScript
          command: bun run lint

  typecheck:
    executor: default
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - run:
          name: Typecheck
          command: bun run typecheck

  test:
    executor: default
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - run:
          name: Run unit tests
          command: bun run test
      - store_test_results:
          path: .results
      - run:
          name: Create GitHub Issue on failure
          when: on_fail
          command: |
            if [ -n "${GITHUB_TOKEN}" ]; then
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues \
                -d "{
                  \"title\": \"[CI Failure] Unit tests failed on ${CIRCLE_BRANCH}\",
                  \"body\": \"## CI Failure Report\n\n**Job:** test\n**Branch:** ${CIRCLE_BRANCH}\n**Commit:** ${CIRCLE_SHA1}\n**Build:** [#${CIRCLE_BUILD_NUM}](${CIRCLE_BUILD_URL})\n\n### Actions Required\n\n- [ ] Review the build logs\n- [ ] Fix the failing tests\n- [ ] Re-run the CI pipeline\",
                  \"labels\": [\"ci-failure\", \"automated\"]
                }"
            fi

  integration:
    executor: machine-large
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Start libSQL (compose.yaml)
          command: |
            docker compose -f compose.yaml up -d --wait sqlite
            docker compose -f compose.yaml run --rm setup-db
      - run:
          name: Run integration tests (compose.ci.yaml)
          command: docker compose -f compose.ci.yaml run --rm --no-deps integration
      - run:
          name: Tear down compose.yaml services
          when: always
          command: docker compose -f compose.yaml stop sqlite || true
      - store_test_results:
          path: .results
      - run:
          name: Create GitHub Issue on failure
          when: on_fail
          command: |
            if [ -n "${GITHUB_TOKEN}" ]; then
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues \
                -d "{
                  \"title\": \"[CI Failure] Integration tests failed on ${CIRCLE_BRANCH}\",
                  \"body\": \"## CI Failure Report\n\n**Job:** integration\n**Branch:** ${CIRCLE_BRANCH}\n**Commit:** ${CIRCLE_SHA1}\n**Build:** [#${CIRCLE_BUILD_NUM}](${CIRCLE_BUILD_URL})\n\n### Actions Required\n\n- [ ] Review the build logs\n- [ ] Fix the failing tests\n- [ ] Re-run the CI pipeline\",
                  \"labels\": [\"ci-failure\", \"automated\"]
                }"
            fi

  security-scan:
    executor: machine-large
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Secret detection (gitleaks via compose.ci.yaml)
          command: |
            echo "=== Gitleaks Secret Detection ==="
            set +e
            docker compose -f compose.ci.yaml run --rm gitleaks
            GITLEAKS_EXIT=$?
            set -e

            if [ -f "gitleaks-report.json" ]; then
              SECRETS_FOUND=$(python3 - <<'PY'
import json
from pathlib import Path
data = json.loads(Path("gitleaks-report.json").read_text() or "[]")
if isinstance(data, list):
    print(len(data))
elif isinstance(data, dict):
    findings = data.get("Findings", data.get("findings", []))
    print(len(findings) if isinstance(findings, list) else 0)
else:
    print(0)
PY
)
              if [ "${SECRETS_FOUND}" -gt "0" ]; then
                echo "✗ Found ${SECRETS_FOUND} potential secrets"
                exit 1
              fi
            elif [ "${GITLEAKS_EXIT}" -ne 0 ]; then
              echo "✗ gitleaks failed without report"
              exit "${GITLEAKS_EXIT}"
            fi
            echo "✓ No secrets found"
      - run:
          name: Filesystem vulnerability scan (trivy via compose.ci.yaml)
          command: |
            echo "=== Trivy Filesystem Scan ==="
            docker compose -f compose.ci.yaml run --rm trivy

            HIGH_VULNS=$(python3 - <<'PY'
import json
from pathlib import Path
path = Path("trivy-report.json")
if not path.exists():
    print(0)
    raise SystemExit
data = json.loads(path.read_text() or "{}")
count = 0
for result in data.get("Results") or []:
    for vuln in result.get("Vulnerabilities") or []:
        if vuln.get("Severity") in ("HIGH", "CRITICAL"):
            count += 1
print(count)
PY
)

            if [ "${HIGH_VULNS}" -gt "0" ]; then
              echo "✗ Found ${HIGH_VULNS} high/critical vulnerabilities"
              exit 1
            fi

            echo "✓ No high/critical vulnerabilities found"
      - run:
          name: Dependency vulnerability scan (snyk via compose.ci.yaml)
          command: |
            echo "=== Snyk Dependency Scan ==="

            if [ -z "${SNYK_TOKEN}" ]; then
              echo "⚠ SNYK_TOKEN not set, skipping Snyk scan"
              exit 0
            fi

            # snyk test は脆弱性があると非0終了するため || true でレポートを残す
            docker compose -f compose.ci.yaml run --rm -e SNYK_TOKEN snyk || true

            if [ ! -f "snyk-report.json" ]; then
              echo "⚠ snyk-report.json not produced"
              exit 0
            fi

            HIGH_VULNS=$(python3 - <<'PY'
import json
from pathlib import Path
data = json.loads(Path("snyk-report.json").read_text() or "{}")
vulns = data.get("vulnerabilities") or []
print(sum(1 for v in vulns if v.get("severity") in ("high", "critical")))
PY
)

            if [ "${HIGH_VULNS}" -gt "0" ]; then
              echo "✗ Found ${HIGH_VULNS} high/critical vulnerabilities"
              exit 1
            fi

            echo "✓ No high/critical vulnerabilities found"
      - store_artifacts:
          path: snyk-report.json
          destination: security/snyk-report.json
      - store_artifacts:
          path: trivy-report.json
          destination: security/trivy-report.json
      - store_artifacts:
          path: gitleaks-report.json
          destination: security/gitleaks-report.json
      - run:
          name: Create GitHub Issue on security failure
          when: on_fail
          command: |
            if [ -n "${GITHUB_TOKEN}" ]; then
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues \
                -d "{
                  \"title\": \"[Security Alert] Vulnerabilities detected on ${CIRCLE_BRANCH}\",
                  \"body\": \"## Security Scan Failure\n\n**Branch:** ${CIRCLE_BRANCH}\n**Commit:** ${CIRCLE_SHA1}\n**Build:** [#${CIRCLE_BUILD_NUM}](${CIRCLE_BUILD_URL})\n\n### Actions Required\n\n- [ ] Review security scan reports in artifacts\n- [ ] Update vulnerable dependencies\n- [ ] Remove detected secrets\n- [ ] Re-run security scan\n\n### Reports\n\n- Snyk: Check artifacts/security/snyk-report.json\n- Trivy: Check artifacts/security/trivy-report.json\n- Gitleaks: Check artifacts/security/gitleaks-report.json\",
                  \"labels\": [\"security\", \"vulnerability\", \"automated\"]
                }"
            fi

  e2e:
    executor: large
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - browser-tools/install-chrome
      - browser-tools/install-chromedriver
      - run:
          name: Install Playwright browsers
          command: |
            bun add -g @playwright/test
            bunx playwright install --with-deps chromium
      - run:
          name: Run E2E tests
          command: bun run e2e
          no_output_timeout: 20m
      - store_artifacts:
          path: docs/playwright/report
          destination: playwright-report
      - store_test_results:
          path: .results
      - run:
          name: Create GitHub Issue on failure
          when: on_fail
          command: |
            if [ -n "${GITHUB_TOKEN}" ]; then
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues \
                -d "{
                  \"title\": \"[CI Failure] E2E tests failed on ${CIRCLE_BRANCH}\",
                  \"body\": \"## CI Failure Report\n\n**Job:** e2e\n**Branch:** ${CIRCLE_BRANCH}\n**Commit:** ${CIRCLE_SHA1}\n**Build:** [#${CIRCLE_BUILD_NUM}](${CIRCLE_BUILD_URL})\n\n### Actions Required\n\n- [ ] Review the Playwright report\n- [ ] Fix the failing E2E tests\n- [ ] Re-run the CI pipeline\",
                  \"labels\": [\"ci-failure\", \"e2e\", \"automated\"]
                }"
            fi

  build:
    executor: default
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - restore-turbo
      - run:
          name: Build application
          command: bun run build
      - save-turbo
      - persist_to_workspace:
          root: .
          paths:
            - apps/*/dist
            - apps/*/build
            - packages/*/dist
      - run:
          name: Create GitHub Issue on failure
          when: on_fail
          command: |
            if [ -n "${GITHUB_TOKEN}" ]; then
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues \
                -d "{
                  \"title\": \"[CI Failure] Build failed on ${CIRCLE_BRANCH}\",
                  \"body\": \"## CI Failure Report\n\n**Job:** build\n**Branch:** ${CIRCLE_BRANCH}\n**Commit:** ${CIRCLE_SHA1}\n**Build:** [#${CIRCLE_BUILD_NUM}](${CIRCLE_BUILD_URL})\n\n### Actions Required\n\n- [ ] Review the build logs\n- [ ] Fix the build errors\n- [ ] Re-run the CI pipeline\",
                  \"labels\": [\"ci-failure\", \"build\", \"automated\"]
                }"
            fi

  upload-artifacts:
    executor: default
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Package build artifacts for CircleCI
          command: |
            VERSION="${CIRCLE_SHA1:0:7}-$(date +%s)"
            echo "export ARTIFACT_VERSION=${VERSION}" >> $BASH_ENV
            source $BASH_ENV

            echo "${VERSION}" > .artifact-version
            echo "${CIRCLE_SHA1}" > .artifact-sha

            mkdir -p ci-artifacts/versions/${ARTIFACT_VERSION} ci-artifacts/${CIRCLE_SHA1}

            for app in web api admin wiki; do
              for kind in dist build; do
                SRC="apps/${app}/${kind}"
                if [ -d "${SRC}" ]; then
                  mkdir -p "ci-artifacts/versions/${ARTIFACT_VERSION}/${app}" "ci-artifacts/${CIRCLE_SHA1}/${app}"
                  cp -R "${SRC}" "ci-artifacts/versions/${ARTIFACT_VERSION}/${app}/${kind}"
                  cp -R "${SRC}" "ci-artifacts/${CIRCLE_SHA1}/${app}/${kind}"
                fi
              done
            done

            cat > manifest.json \<<EOF
            {
              "version": "${ARTIFACT_VERSION}",
              "sha": "${CIRCLE_SHA1}",
              "branch": "${CIRCLE_BRANCH}",
              "build_num": ${CIRCLE_BUILD_NUM},
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "environment": "rc",
              "git_author": "${CIRCLE_USERNAME}",
              "build_url": "${CIRCLE_BUILD_URL}"
            }
            EOF

            cp manifest.json "ci-artifacts/versions/${ARTIFACT_VERSION}/manifest.json"
            cp manifest.json "ci-artifacts/${CIRCLE_SHA1}/manifest.json"
            mkdir -p ci-artifacts/latest-rc
            cp manifest.json ci-artifacts/latest-rc/manifest.json

            echo "Artifacts packaged under ci-artifacts/"
      - persist_to_workspace:
          root: .
          paths:
            - .artifact-version
            - .artifact-sha
            - manifest.json
            - ci-artifacts
            - apps/web/dist
            - apps/web/build
            - apps/api/dist
            - apps/admin/dist
            - apps/admin/build
            - apps/wiki/dist
            - apps/wiki/build
      - store_artifacts:
          path: ci-artifacts
          destination: build-artifacts

  download-artifacts:
    executor: default
    parameters:
      commit_sha:
        type: string
        default: ""
      artifact_version:
        type: string
        default: ""
      environment:
        type: enum
        enum: [rc, stg, prd]
        default: rc
    steps:
      - checkout
      - install-bun
      - run:
          name: Prepare artifacts (rebuild from source)
          command: |
            echo "=== Preparing artifacts for << parameters.environment >> ==="
            # prepare はフルビルドするため、install 時はスキップしてから一度だけ build
            bun install --frozen-lockfile --ignore-scripts
            bun run build

            mkdir -p artifacts
            for app in web api admin wiki; do
              for kind in dist build; do
                SRC="apps/${app}/${kind}"
                if [ -d "${SRC}" ]; then
                  mkdir -p "artifacts/${app}"
                  cp -R "${SRC}" "artifacts/${app}/${kind}"
                fi
              done
            done

            cat > manifest.json \<<EOF
            {
              "version": "${CIRCLE_SHA1:0:7}-rebuild",
              "sha": "${CIRCLE_SHA1}",
              "branch": "${CIRCLE_BRANCH}",
              "build_num": ${CIRCLE_BUILD_NUM},
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "environment": "<< parameters.environment >>",
              "source": "rebuild"
            }
            EOF

            cp manifest.json artifacts/manifest.json
            echo "Artifacts prepared"
      - persist_to_workspace:
          root: .
          paths:
            - artifacts
            - manifest.json
            - apps/web/dist
            - apps/web/build
            - apps/api/dist
            - apps/admin/dist
            - apps/admin/build
            - apps/wiki/dist
            - apps/wiki/build
      - store_artifacts:
          path: artifacts
          destination: deploy-artifacts-<< parameters.environment >>

  artifact-promotion:
    executor: default
    parameters:
      from_environment:
        type: enum
        enum: [rc, stg]
      to_environment:
        type: enum
        enum: [stg, prd]
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Record promotion << parameters.from_environment >> to << parameters.to_environment >>
          command: |
            if [ -f manifest.json ]; then
              FROM_MANIFEST=manifest.json
            elif [ -f artifacts/manifest.json ]; then
              FROM_MANIFEST=artifacts/manifest.json
            else
              echo '{"version":"unknown","sha":"'"${CIRCLE_SHA1}"'"}' > from-manifest.json
              FROM_MANIFEST=from-manifest.json
            fi

            jq --arg env "<< parameters.to_environment >>" \
               --arg from "<< parameters.from_environment >>" \
               --arg at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
               '.environment = $env | .promoted_at = $at | .promoted_from = $from' \
               "${FROM_MANIFEST}" > to-manifest.json

            mkdir -p "ci-artifacts/latest-<< parameters.to_environment >>"
            cp to-manifest.json "ci-artifacts/latest-<< parameters.to_environment >>/manifest.json"
            echo "Promotion recorded"
            cat to-manifest.json | jq '.'
      - persist_to_workspace:
          root: .
          paths:
            - to-manifest.json
            - ci-artifacts
      - store_artifacts:
          path: to-manifest.json
          destination: promotion-<< parameters.to_environment >>

  db-migrate:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - load-env-config:
          environment: << parameters.environment >>
      - run:
          name: Apply D1 migrations for << parameters.environment >>
          command: |
            echo "=== Applying Cloudflare D1 migrations for << parameters.environment >> ==="
            bun add -g wrangler@latest

            DB_NAME="${D1_DATABASE_NAME:-portfolio-<< parameters.environment >>-db}"
            echo "Database: ${DB_NAME}"

            cd packages/db
            bunx wrangler d1 migrations apply "${DB_NAME}" --remote

            echo "D1 migrations completed"
      - run:
          name: Create GitHub Issue on failure
          when: on_fail
          command: |
            if [ -n "${GITHUB_TOKEN}" ]; then
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues \
                -d "{
                  \"title\": \"[Migration Failure] D1 migration failed on << parameters.environment >>\",
                  \"body\": \"## D1 Migration Failure\n\n**Environment:** << parameters.environment >>\n**Branch:** ${CIRCLE_BRANCH}\n**Commit:** ${CIRCLE_SHA1}\n**Build:** [#${CIRCLE_BUILD_NUM}](${CIRCLE_BUILD_URL})\",
                  \"labels\": [\"migration-failure\", \"<< parameters.environment >>\", \"automated\"]
                }"
            fi

  pre-deploy-check:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - load-env-config:
          environment: << parameters.environment >>
      - run:
          name: Pre-deployment validation
          command: |
            echo "=== Pre-deployment checks for << parameters.environment >> ==="

            echo "Checking build artifacts..."
            if [ ! -d "artifacts/${CIRCLE_SHA1}" ] && [ ! -f "manifest.json" ]; then
              echo "✗ Build artifacts not found"
              exit 1
            fi
            echo "✓ Build artifacts verified"

            echo "Validating environment configuration..."
            if [ -f "infra/env.yaml" ]; then
              echo "✓ Environment configuration loaded"
            else
              echo "✗ Environment configuration not found"
              exit 1
            fi

            echo "=== All pre-deployment checks passed ==="

  preview-deploy:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - load-env-config:
          environment: << parameters.environment >>
      - run:
          name: Install Wrangler CLI
          command: |
            bun add -g wrangler@latest
            wrangler --version
      - run:
          name: Deploy preview for << parameters.environment >>
          command: |
            echo "=== Deploying preview to << parameters.environment >> environment ==="
            echo "Commit: ${CIRCLE_SHA1}"
            echo "Build: ${CIRCLE_BUILD_NUM}"

            bun run deploy -- --env=preview

            echo "✓ Preview deployment completed"
      - persist_to_workspace:
          root: .
          paths:
            - .preview-url

  smoke-test:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - load-env-config:
          environment: << parameters.environment >>
      - run:
          name: Run smoke tests on preview
          command: |
            echo "=== Running smoke tests on preview deployment ==="

            if [ -f ".preview-url" ]; then
              PREVIEW_URL=$(cat .preview-url)
              echo "Testing: $PREVIEW_URL"
            else
              echo "⚠ Preview URL not found, using default"
              case "<< parameters.environment >>" in
                rc) PREVIEW_URL="https://rc.www.ageha734.jp" ;;
                stg) PREVIEW_URL="https://stg.www.ageha734.jp" ;;
                prd) PREVIEW_URL="https://www.ageha734.jp" ;;
              esac
            fi

            echo "Health check: ${PREVIEW_URL}"
            if curl -sSf "${PREVIEW_URL}/" > /dev/null 2>&1; then
              echo "✓ Health check passed"
            else
              echo "✗ Health check failed"
              exit 1
            fi

            echo "✓ All smoke tests passed"

  validate-deployment:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
      monitoring_duration:
        type: string
        default: "15m"
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - load-env-config:
          environment: << parameters.environment >>
      - run:
          name: Comprehensive deployment validation for << parameters.environment >>
          command: |
            echo "=== Deployment Validation for << parameters.environment >> ==="
            echo "Monitoring duration: << parameters.monitoring_duration >>"

            case "<< parameters.environment >>" in
              rc)
                BASE_URL="https://rc.www.ageha734.jp"
                API_URL="https://rc.api.ageha734.jp"
                ;;
              stg)
                BASE_URL="https://stg.www.ageha734.jp"
                API_URL="https://stg.api.ageha734.jp"
                ;;
              prd)
                BASE_URL="https://www.ageha734.jp"
                API_URL="https://api.ageha734.jp"
                ;;
            esac

            echo "=== 1. Health Checks ==="
            if curl -sSf "${BASE_URL}/" > /dev/null 2>&1; then
              echo "✓ Web: ${BASE_URL}"
            else
              echo "✗ Web health check failed"
              exit 1
            fi

            if curl -sSf "${API_URL}/health" | jq -e '.status == "healthy"' > /dev/null 2>&1; then
              echo "✓ API: ${API_URL}/health"
            else
              echo "✗ API health check failed"
              exit 1
            fi

            echo "=== 2. Critical Path E2E Tests ==="
            if [ -d "apps/e2e" ]; then
              bunx playwright test --grep "@critical" --reporter=line || {
                echo "✗ Critical E2E tests failed"
                exit 1
              }
              echo "✓ Critical E2E tests passed"
            else
              echo "⚠ E2E tests not found, skipping"
            fi

            echo "=== 3. Error Rate Monitoring ==="
            if [ -n "${SENTRY_AUTH_TOKEN}" ]; then
              CURRENT_ERRORS=$(curl -s "https://sentry.io/api/0/organizations/${SENTRY_ORG}/stats_v2/?statsPeriod=15m&interval=15m&field=sum(quantity)&category=error" \
                -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" | jq '.[0].series."sum(quantity)"[0] // 0')

              BASELINE_ERRORS=$(curl -s "https://sentry.io/api/0/organizations/${SENTRY_ORG}/stats_v2/?statsPeriod=1h&interval=1h&field=sum(quantity)&category=error" \
                -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" | jq '.[0].series."sum(quantity)"[0] // 0')

              THRESHOLD=$(echo "${BASELINE_ERRORS} * 1.5" | bc)

              if (( $(echo "${CURRENT_ERRORS} > ${THRESHOLD}" | bc -l) )); then
                echo "✗ Error rate too high: ${CURRENT_ERRORS} (baseline: ${BASELINE_ERRORS})"
                exit 1
              fi
              echo "✓ Error rate within acceptable range: ${CURRENT_ERRORS} (baseline: ${BASELINE_ERRORS})"
            else
              echo "⚠ SENTRY_AUTH_TOKEN not set, skipping error rate check"
            fi

            echo "=== 4. Performance Metrics ==="
            if command -v lighthouse > /dev/null 2>&1; then
              lighthouse "${BASE_URL}" \
                --only-categories=performance \
                --preset=desktop \
                --chrome-flags="--headless" \
                --output=json \
                --output-path=./lighthouse-report.json \
                --quiet

              PERFORMANCE_SCORE=$(jq '.categories.performance.score * 100' lighthouse-report.json)
              echo "Performance score: ${PERFORMANCE_SCORE}"

              if (( $(echo "${PERFORMANCE_SCORE} < 80" | bc -l) )); then
                echo "⚠ Performance score below threshold (80)"
              else
                echo "✓ Performance score acceptable"
              fi
            else
              echo "⚠ Lighthouse not installed, skipping performance check"
            fi

            echo "=== 5. Resource Monitoring ==="
            if [ -n "${CLOUDFLARE_API_TOKEN}" ] && command -v wrangler > /dev/null 2>&1; then
              echo "Checking resource usage..."
              echo "✓ Resource monitoring check completed"
            else
              echo "⚠ Cloudflare credentials not set, skipping resource check"
            fi

            if [ "<< parameters.environment >>" = "prd" ]; then
              echo "=== 6. Business Metrics (PRD) ==="

              if [ -n "${SENTRY_AUTH_TOKEN}" ]; then
                CURRENT_USERS=$(curl -s "https://sentry.io/api/0/organizations/${SENTRY_ORG}/stats_v2/?statsPeriod=1h&interval=1h&field=count_unique(user)&category=transaction" \
                  -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" | jq '.[0].series."count_unique(user)"[0] // 0')

                BASELINE_USERS=$(curl -s "https://sentry.io/api/0/organizations/${SENTRY_ORG}/stats_v2/?statsPeriod=24h&interval=24h&field=count_unique(user)&category=transaction" \
                  -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" | jq '.[0].series."count_unique(user)"[0] // 0')

                MIN_USERS=$(echo "${BASELINE_USERS} * 0.8" | bc)

                if (( $(echo "${CURRENT_USERS} < ${MIN_USERS}" | bc -l) )); then
                  echo "⚠ Active users dropped significantly: ${CURRENT_USERS} (baseline: ${BASELINE_USERS})"
                else
                  echo "✓ Active users within acceptable range: ${CURRENT_USERS}"
                fi
              else
                echo "⚠ Business metrics check skipped (SENTRY_AUTH_TOKEN not set)"
              fi
            fi

            echo "=== All validation checks passed ==="
      - store_artifacts:
          path: lighthouse-report.json
          destination: performance/lighthouse-report.json

  gradual-rollout:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [stg, prd]
      percentage:
        type: integer
      duration_minutes:
        type: integer
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - run:
          name: Gradual rollout << parameters.percentage >>% for << parameters.environment >>
          command: |
            echo "=== Gradual Rollout: << parameters.percentage >>% ==="
            echo "Environment: << parameters.environment >>"
            echo "Duration: << parameters.duration_minutes >> minutes"

            sleep $(( << parameters.duration_minutes >> * 60 ))

            echo "✓ Gradual rollout phase completed"

  infra-plan:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - checkout
      - install-bun
      - run:
          name: Install Pulumi CLI
          command: |
            curl -fsSL https://get.pulumi.com | sh
            echo 'export PATH=$HOME/.pulumi/bin:$PATH' >> $BASH_ENV
            source $BASH_ENV
            pulumi version
      - run:
          name: Install dependencies
          command: |
            cd infra
            bun install --frozen-lockfile --ignore-scripts
      - prepare-infra-env:
          environment: << parameters.environment >>
      - login-pulumi-r2
      - run:
          name: Build infrastructure code
          command: |
            cd infra
            bun run build
      - run:
          name: Pulumi preview for << parameters.environment >>
          command: |
            cd infra
            pulumi stack select "<< parameters.environment >>" --create
            echo "=== Infrastructure Preview for << parameters.environment >> ==="
            pulumi preview --diff --non-interactive
            echo "✓ Infrastructure preview completed"
      - store_artifacts:
          path: infra/Pulumi.yaml
          destination: infra/Pulumi.yaml

  infra-deploy:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - checkout
      - install-bun
      - run:
          name: Install Pulumi CLI
          command: |
            curl -fsSL https://get.pulumi.com | sh
            echo 'export PATH=$HOME/.pulumi/bin:$PATH' >> $BASH_ENV
            source $BASH_ENV
            pulumi version
      - run:
          name: Install dependencies
          command: |
            cd infra
            bun install --frozen-lockfile --ignore-scripts
      - prepare-infra-env:
          environment: << parameters.environment >>
      - login-pulumi-r2
      - run:
          name: Build infrastructure code
          command: |
            cd infra
            bun run build
      - run:
          name: Deploy infrastructure to << parameters.environment >>
          command: |
            cd infra
            pulumi stack select "<< parameters.environment >>" --create
            echo "=== Deploying Infrastructure to << parameters.environment >> ==="
            echo "Stack: << parameters.environment >>"
            pulumi up --yes --skip-preview --non-interactive
            echo "✓ Infrastructure deployment completed"
            pulumi stack output --json > stack-outputs.json
            cat stack-outputs.json | jq '.'
      - store_artifacts:
          path: infra/stack-outputs.json
          destination: infra/stack-outputs.json
      - run:
          name: Create GitHub Issue on failure
          when: on_fail
          command: |
            if [ -n "${GITHUB_TOKEN}" ]; then
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues \
                -d "{
                  \"title\": \"[Infra Failure] Infrastructure deployment failed on << parameters.environment >>\",
                  \"body\": \"## Infrastructure Deployment Failure\n\n**Environment:** << parameters.environment >>\n**Branch:** ${CIRCLE_BRANCH}\n**Commit:** ${CIRCLE_SHA1}\n**Build:** [#${CIRCLE_BUILD_NUM}](${CIRCLE_BUILD_URL})\n\n### Actions Required\n\n- [ ] Review the Pulumi logs\n- [ ] Check infra/src code changes\n- [ ] Verify Pulumi R2 backend state\n- [ ] Manual rollback if necessary\n\n### Manual Commands\n\n\`\`\`bash\ncd infra\npulumi login \\\"\\\$PULUMI_BACKEND_URL\\\"\npulumi stack select << parameters.environment >>\npulumi preview --diff\npulumi up\n\`\`\`\",
                  \"labels\": [\"infra-failure\", \"<< parameters.environment >>\", \"automated\"]
                }"
            fi

  deploy:
    executor: default
    parameters:
      environment:
        type: enum
        enum: [rc, stg, prd]
    steps:
      - attach_workspace:
          at: .
      - install-bun
      - load-env-config:
          environment: << parameters.environment >>
      - run:
          name: Install Wrangler CLI
          command: |
            bun add -g wrangler@latest
            wrangler --version
      - run:
          name: Setup Cloudflare credentials
          command: |
            export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}"
            echo "Cloudflare credentials configured"
      - run:
          name: Deploy to << parameters.environment >>
          command: |
            echo "=== Deploying to << parameters.environment >> environment ==="
            echo "Commit: ${CIRCLE_SHA1}"
            echo "Build: ${CIRCLE_BUILD_NUM}"

            MAX_RETRIES=3
            RETRY_COUNT=0

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              echo "Deploy attempt $((RETRY_COUNT + 1))/$MAX_RETRIES"

              if bun run deploy; then
                echo "✓ Deploy succeeded"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Deploy failed, retrying in 10 seconds..."
                  sleep 10
                else
                  echo "✗ Deploy failed after $MAX_RETRIES attempts"
                  exit 1
                fi
              fi
            done
          no_output_timeout: 15m
      - run:
          name: Post-deployment verification with auto-rollback
          command: |
            echo "=== Post-deployment Verification ==="

            sleep 30

            case "<< parameters.environment >>" in
              rc)
                WEB_URL="https://rc.www.${DOMAIN:-ageha734.jp}"
                API_URL="https://rc.api.${DOMAIN:-ageha734.jp}"
                ;;
              stg)
                WEB_URL="https://stg.www.${DOMAIN:-ageha734.jp}"
                API_URL="https://stg.api.${DOMAIN:-ageha734.jp}"
                ;;
              prd)
                WEB_URL="https://www.${DOMAIN:-ageha734.jp}"
                API_URL="https://api.${DOMAIN:-ageha734.jp}"
                ;;
            esac

            DEPLOYMENT_HEALTHY=true

            echo "Checking Web: ${WEB_URL}"
            if curl -sSf "${WEB_URL}/" > /dev/null 2>&1; then
              echo "✓ Web is accessible"
            else
              echo "✗ Web health check failed"
              DEPLOYMENT_HEALTHY=false
            fi

            echo "Checking API: ${API_URL}/health"
            if curl -sSf "${API_URL}/health" | jq -e '.status == "healthy"' > /dev/null 2>&1; then
              echo "✓ API is healthy"
            else
              echo "✗ API health check failed"
              DEPLOYMENT_HEALTHY=false
            fi

            echo "Running critical smoke test..."
            if bunx playwright test --grep "@smoke" --reporter=line; then
              echo "✓ Smoke tests passed"
            else
              echo "✗ Smoke tests failed"
              DEPLOYMENT_HEALTHY=false
            fi

            if [ "${DEPLOYMENT_HEALTHY}" = "false" ]; then
              echo "=== AUTO-ROLLBACK TRIGGERED ==="
              echo "Deployment validation failed, rolling back..."

              if wrangler pages deployment list --project-name portfolio-web | head -2 | tail -1 | awk '{print $1}' | xargs -I {} wrangler pages deployment rollback --deployment-id {}; then
                echo "✓ Web rollback successful"
              else
                echo "✗ Web rollback failed"
              fi

              if wrangler rollback --name api; then
                echo "✓ API rollback successful"
              else
                echo "✗ API rollback failed"
              fi

              echo "Rollback completed. Manual intervention required."
              exit 1
            fi

            echo "✓ Deployment verification successful"
      - run:
          name: Create GitHub Issue on failure
          when: on_fail
          command: |
            if [ -n "${GITHUB_TOKEN}" ]; then
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/issues \
                -d "{
                  \"title\": \"[Deploy Failure] << parameters.environment >> deployment failed on ${CIRCLE_BRANCH}\",
                  \"body\": \"## Deployment Failure Report\n\n**Environment:** << parameters.environment >>\n**Branch:** ${CIRCLE_BRANCH}\n**Commit:** ${CIRCLE_SHA1}\n**Build:** [#${CIRCLE_BUILD_NUM}](${CIRCLE_BUILD_URL})\n\n### Actions Required\n\n- [ ] Review the deployment logs\n- [ ] Check Cloudflare dashboard\n- [ ] Verify Doppler configuration\n- [ ] Consider rollback if necessary\n\n### Rollback Command\n\n\`\`\`bash\nwrangler pages deployment rollback --project-name portfolio-web\n\`\`\`\",
                  \"labels\": [\"deployment-failure\", \"<< parameters.environment >>\", \"automated\"]
                }"
            fi

  backup-database:
    executor: default
    steps:
      - run:
          name: Skip legacy database object-store backup
          command: |
            echo "Cloudflare D1 backups use Dashboard / Time Travel."
            echo "D1 backup is handled via Cloudflare Time Travel / Dashboard (no CI dump)."
            mkdir -p backup-notes
            echo "D1 backups: Cloudflare dashboard / wrangler d1" > backup-notes/README.md
      - store_artifacts:
          path: backup-notes
          destination: backup-notes

  performance-test:
    executor: large
    steps:
      - checkout
      - install-bun
      - run:
          name: Install Lighthouse CLI
          command: |
            bun add -g lighthouse
            lighthouse --version
      - run:
          name: Run Lighthouse performance tests
          command: |
            echo "=== Performance Testing ==="

            URLS=(
              "https://www.ageha734.jp"
              "https://www.ageha734.jp/blog"
              "https://www.ageha734.jp/portfolio"
            )

            mkdir -p performance-reports

            for url in "${URLS[@]}"; do
              echo "Testing: ${url}"

              SANITIZED_URL=$(echo "${url}" | sed 's/[^a-zA-Z0-9]/-/g')

              lighthouse "${url}" \
                --only-categories=performance,accessibility,best-practices,seo \
                --preset=desktop \
                --chrome-flags="--headless" \
                --output=json \
                --output=html \
                --output-path="./performance-reports/${SANITIZED_URL}" \
                --quiet

              PERFORMANCE_SCORE=$(jq '.categories.performance.score * 100' "./performance-reports/${SANITIZED_URL}.report.json")
              echo "Performance score for ${url}: ${PERFORMANCE_SCORE}"

              if (( $(echo "${PERFORMANCE_SCORE} < 80" | bc -l) )); then
                echo "⚠ Performance score below threshold (80) for ${url}"
              fi
            done

            echo "✓ Performance testing completed"
      - store_artifacts:
          path: performance-reports
          destination: performance-reports

  cost-report:
    executor: default
    steps:
      - checkout
      - install-bun
      - run:
          name: Generate monthly cost report
          command: |
            echo "=== Monthly Cost Report ==="

            MONTH=$(date +%Y-%m)
            REPORT_FILE="cost-report-${MONTH}.md"

            cat > "${REPORT_FILE}" \<<EOF
            # Cost Report - ${MONTH}

            ## Cloudflare Workers

            - Workers Requests: $(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/analytics/dashboard" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | jq '.result.totals.requests.all')

            ## Cloudflare D1 / KV / R2

            - D1 / KV / R2 usage: Check Cloudflare Dashboard Storage

            ## CircleCI Artifacts

            - Build artifacts via CircleCI store_artifacts

            ## Summary

            - Total Estimated Cost: \$XX.XX USD
            - Trend: [Up/Down/Stable]

            EOF

            cat "${REPORT_FILE}"

            echo "✓ Cost report generated"
      - store_artifacts:
          path: cost-report-*.md
          destination: cost-reports

  visual-regression-test:
    executor: large
    steps:
      - checkout
      - install-bun
      - browser-tools/install-chrome
      - run:
          name: Install Percy CLI
          command: |
            bun add -g @percy/cli
            percy --version
      - run:
          name: Run visual regression tests
          command: |
            echo "=== Visual Regression Testing ==="

            if [ -n "${PERCY_TOKEN}" ]; then
              export PERCY_TOKEN="${PERCY_TOKEN}"

              bun add -g @percy/playwright

              bunx playwright test --grep "@visual" --reporter=line

              echo "✓ Visual regression tests completed"
            else
              echo "⚠ PERCY_TOKEN not set, skipping visual regression tests"
            fi

  load-test:
    executor: default
    steps:
      - checkout
      - install-bun
      - run:
          name: Install k6
          command: |
            sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
            echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update
            sudo apt-get install k6
            k6 version
      - run:
          name: Run load tests
          command: |
            echo "=== Load Testing ==="

            cat > load-test.js \<<'EOF'
            import http from 'k6/http';
            import { check, sleep } from 'k6';

            export const options = {
              stages: [
                { duration: '2m', target: 10 },
                { duration: '5m', target: 10 },
                { duration: '2m', target: 50 },
                { duration: '5m', target: 50 },
                { duration: '2m', target: 100 },
                { duration: '5m', target: 100 },
                { duration: '5m', target: 0 },
              ],
              thresholds: {
                http_req_duration: ['p(95)<500'],
                http_req_failed: ['rate<0.01'],
              },
            };

            export default function () {
              const res = http.get('https://www.ageha734.jp');
              check(res, {
                'status is 200': (r) => r.status === 200,
                'response time < 500ms': (r) => r.timings.duration < 500,
              });
              sleep(1);
            }
            EOF

            k6 run --out json=load-test-results.json load-test.js

            echo "✓ Load testing completed"
      - store_artifacts:
          path: load-test-results.json
          destination: load-test-results.json

workflows:
  # CI 成功後にのみ RC デプロイ / infra を起動（同一 workflow で requires 接続）
  ci-cd:
    jobs:
      - setup:
          filters:
            branches:
              ignore:
                - /^copilot\/.*/

      - format:
          requires:
            - setup

      - lint:
          requires:
            - setup

      - typecheck:
          requires:
            - setup

      - test:
          requires:
            - format
            - lint
            - typecheck

      - security-scan:
          requires:
            - setup
          context: security

      - e2e:
          requires:
            - test
            - security-scan

      - build:
          requires:
            - e2e

      - upload-artifacts:
          requires:
            - build
          filters:
            branches:
              only:
                - master
                - main

      # --- CD (RC): CI の upload-artifacts 成功後 ---
      - download-artifacts:
          name: download-artifacts-rc
          environment: rc
          requires:
            - upload-artifacts
          filters:
            branches:
              only:
                - master
                - main

      - pre-deploy-check:
          name: pre-deploy-check-rc
          environment: rc
          requires:
            - download-artifacts-rc
          context: env-config
          filters:
            branches:
              only:
                - master
                - main

      - db-migrate:
          name: db-migrate-rc
          environment: rc
          requires:
            - pre-deploy-check-rc
          context: env-config
          filters:
            branches:
              only:
                - master
                - main

      - preview-deploy:
          name: preview-deploy-rc
          environment: rc
          requires:
            - db-migrate-rc
          context:
            - cloudflare
            - env-config
          filters:
            branches:
              only:
                - master
                - main

      - smoke-test:
          name: smoke-test-rc
          environment: rc
          requires:
            - preview-deploy-rc
          context: env-config
          filters:
            branches:
              only:
                - master
                - main

      - validate-deployment:
          name: validate-deployment-rc
          environment: rc
          monitoring_duration: "15m"
          requires:
            - smoke-test-rc
          context:
            - env-config
            - sentry
          filters:
            branches:
              only:
                - master
                - main

      - hold-approval:
          name: hold-approval-rc
          type: approval
          requires:
            - validate-deployment-rc
          filters:
            branches:
              only:
                - master
                - main

      - deploy:
          name: deploy-rc
          environment: rc
          requires:
            - hold-approval-rc
          context:
            - cloudflare
            - env-config
          filters:
            branches:
              only:
                - master
                - main

      # --- Infra (RC): CI 成功後 ---
      - infra-plan:
          name: infra-plan-rc
          environment: rc
          requires:
            - upload-artifacts
          context:
            - pulumi
            - env-config
          filters:
            branches:
              only:
                - master
                - main

      - hold-infra-approval:
          name: hold-infra-approval-rc
          type: approval
          requires:
            - infra-plan-rc
          filters:
            branches:
              only:
                - master
                - main

      - infra-deploy:
          name: infra-deploy-rc
          environment: rc
          requires:
            - hold-infra-approval-rc
          context:
            - pulumi
            - env-config
          filters:
            branches:
              only:
                - master
                - main

  deploy-stg:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - artifact-promotion:
          from_environment: rc
          to_environment: stg

      - download-artifacts:
          environment: stg
          requires:
            - artifact-promotion

      - pre-deploy-check:
          environment: stg
          requires:
            - download-artifacts
          context: env-config

      - db-migrate:
          environment: stg
          requires:
            - pre-deploy-check
