general:
  appVersion: "1.0.0"
  nodeEnv: "production"

infra:
  cloudflare:
    accountId: ""
    apiToken: ""
    zoneId: ""
  sentry:
    authToken: ""
    org: ""

secrets:
  auth:
    betterAuthSecret: ""
    googleClientId: ""
    googleClientSecret: ""
  sentry:
    dsn: ""

# ドメイン命名:
#   prd: https://www.ageha734.jp / https://api.ageha734.jp
#   rc:  https://rc.www.ageha734.jp / https://rc.api.ageha734.jp
#   stg: https://stg.www.ageha734.jp / https://stg.api.ageha734.jp
# （環境プレフィックスはアプリ名の前）
apps:
  web:
    type: "pages"
    buildCommand: "bun run build:remix"
    outputDir: "./build/client"
    watchDirs:
      - "app"
      - "public"
      - "functions"
    baseUrl: "https://www.ageha734.jp"
    vite:
      baseUrl: "https://www.ageha734.jp"
      sentry:
        environment: "production"
        tracesSampleRate: "0.1"
        replaySampleRate: "0.1"
        replayOnErrorSampleRate: "1.0"
      analytics:
        googleAnalyticsEnabled: "true"
        googleTagManagerEnabled: "true"
      debug:
        xstateInspectorEnabled: "false"
  admin:
    type: "pages"
    buildCommand: "bun run build"
    outputDir: "./build"
    watchDirs:
      - "app"
      - "public"
      - "functions"
    baseUrl: "https://admin.ageha734.jp"
    betterAuthUrl: "https://admin.ageha734.jp"
    vite:
      sentry:
        environment: "production"
        tracesSampleRate: "0.1"
        replaySampleRate: "0.1"
        replayOnErrorSampleRate: "1.0"
  api:
    type: "worker"
    main: "src/index.ts"
    baseUrl: "https://api.ageha734.jp"
  portal:
    type: "pages"
    buildCommand: "bun run build"
    outputDir: "./build/client"
    watchDirs:
      - "app"
      - "public"
      - "functions"
    baseUrl: "https://portal.ageha734.jp"
  wiki:
    type: "pages"
    buildCommand: "bun run build"
    outputDir: "./build"
    watchDirs:
      - "app"
      - "public"
      - "functions"
    baseUrl: "https://wiki.ageha734.jp"
