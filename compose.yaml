include:
  - .docker/db/compose.yml
  - .docker/verdaccio/compose.yml

networks:
  api:
    driver: bridge
    name: portfolio_api

services:
  mock-apis:
    build:
      context: testing/mock-apis
      dockerfile: Dockerfile
    image: portfolio-mock-apis:local
    container_name: mock-apis
    networks:
      - api
    ports:
      - target: 3920
        published: 3920
        protocol: tcp
    environment:
      PORT: 3920
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3920/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: http://127.0.0.1:4873
      network: host
    image: portfolio-api:local
    container_name: api
    networks:
      - api
      - db
    ports:
      - target: 8080
        published: 3000
        protocol: tcp
    environment:
      NODE_ENV: development
      PORT: 8080
      # Local: libSQL (sqld) container. Production Workers bind Cloudflare D1.
      DATABASE_URL: http://sqlite:8080
      BETTER_AUTH_SECRET: dummy
      BETTER_AUTH_URL: http://api:3000
      GOOGLE_CLIENT_ID: google-client-id
      GOOGLE_CLIENT_SECRET: google-client-secret
      FREEE_CLIENT_ID: mock-client-id
      FREEE_CLIENT_SECRET: mock-client-secret
      FREEE_AUTH_URL: http://mock-apis:3920
      FREEE_API_URL: http://mock-apis:3920
      FREEE_TIMEOUT: 150ms
      FREEE_MAX_RETRIES: 3
      FREEE_RETRY_TIMEOUT: 300ms
    depends_on:
      setup-db:
        condition: service_completed_successfully
      mock-apis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: http://127.0.0.1:4873
      network: host
    image: portfolio-web:local
    container_name: web
    networks:
      - api
    ports:
      - target: 80
        published: 3000
        protocol: tcp
    environment:
      NODE_ENV: development
      VITE_API_URL: http://api:8787
      VITE_GOOGLE_ANALYTICS_ENABLED: false
      VITE_GOOGLE_TAG_MANAGER_ENABLED: false
      VITE_XSTATE_INSPECTOR_ENABLED: true
      VITE_SENTRY_DSN: dummy
      VITE_SENTRY_ENVIRONMENT: development
      VITE_SENTRY_TRACES_SAMPLE_RATE: 1
      VITE_SENTRY_REPLAY_SAMPLE_RATE: 0
      VITE_SENTRY_REPLAY_ON_ERROR_SAMPLE_RATE: 0
    restart: unless-stopped

  e2e:
    build:
      context: apps/e2e
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: http://127.0.0.1:4873
      network: host
    image: portfolio-e2e:local
    container_name: e2e
    networks:
      - api
    ports:
      - target: 80
        published: 3921
        protocol: tcp
    environment:
      NODE_ENV: development
      VITE_API_URL: http://api:8787
      VITE_GOOGLE_ANALYTICS_ENABLED: false
      VITE_GOOGLE_TAG_MANAGER_ENABLED: false
      VITE_XSTATE_INSPECTOR_ENABLED: true
      VITE_SENTRY_DSN: dummy
      VITE_SENTRY_ENVIRONMENT: development
      VITE_SENTRY_TRACES_SAMPLE_RATE: 1
      VITE_SENTRY_REPLAY_SAMPLE_RATE: 0
      VITE_SENTRY_REPLAY_ON_ERROR_SAMPLE_RATE: 0
    restart: unless-stopped

  admin:
    build:
      context: apps/admin
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: http://127.0.0.1:4873
      network: host
    image: portfolio-admin:local
    container_name: admin
    networks:
      - api
    ports:
      - target: 80
        published: 3001
        protocol: tcp
    environment:
      NODE_ENV: development
      VITE_API_URL: http://api:8787
      VITE_GOOGLE_ANALYTICS_ENABLED: false
      VITE_GOOGLE_TAG_MANAGER_ENABLED: false
      VITE_XSTATE_INSPECTOR_ENABLED: true
      VITE_SENTRY_DSN: dummy
      VITE_SENTRY_ENVIRONMENT: development
      VITE_SENTRY_TRACES_SAMPLE_RATE: 1
      VITE_SENTRY_REPLAY_SAMPLE_RATE: 0
      VITE_SENTRY_REPLAY_ON_ERROR_SAMPLE_RATE: 0
    restart: unless-stopped

  wiki:
    build:
      context: apps/wiki
      dockerfile: Dockerfile
      args:
        REGISTRY_URL: http://127.0.0.1:4873
      network: host
    image: portfolio-wiki:local
    container_name: wiki
    networks:
      - api
    ports:
      - target: 80
        published: 3002
        protocol: tcp
    restart: unless-stopped
